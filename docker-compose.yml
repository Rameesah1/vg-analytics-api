services:
  postgres:
    image: postgres:16
    restart: always
    container_name: vg-analytics-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vg_analytics
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vg-analytics-redis
    restart: always
    ports:
      - '6379:6379'

  api:
    build: .
    container_name: vg-analytics-api
    restart: always
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vg_analytics
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  pgdata: