services:
  postgres:
    image: postgres:16
    restart: always
    container_name: vg-analytics-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vg_analytics
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: vg-analytics-api
    restart: always
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vg_analytics
      JWT_SECRET: ${JWT_SECRET}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      - postgres

volumes:
  pgdata: