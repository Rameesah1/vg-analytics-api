services:
  postgres:
    image: postgres:16
    restart: always
    container_name: vg-analytics-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vg_analytics
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vg-analytics-redis
    restart: always
    ports:
      - '6379:6379'

  api:
    build: .
    container_name: vg-analytics-api
    restart: always
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vg_analytics
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      REDIS_URL: redis://redis:6379
      SEED_ENABLE_FUZZY: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python scripts/seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata: